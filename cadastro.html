<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - Anime House</title>
    <link rel="icon" type="image/png" href="img/favicon.png">

    <!-- Scripts: Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            bg: '#0a0f1c',
                            card: '#161f2e',
                            blue: '#3b82f6'
                        }
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-brand-bg text-slate-200 font-sans min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
    <!-- Animated Background Elements -->
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden -z-10">
        <div class="absolute -top-[10%] -right-[10%] w-[40%] h-[40%] bg-blue-600/20 rounded-full blur-[120px] animate-pulse"></div>
        <div class="absolute -bottom-[10%] -left-[10%] w-[40%] h-[40%] bg-indigo-600/20 rounded-full blur-[120px] animate-pulse" style="animation-delay: 2s;"></div>
    </div>

    <div class="w-full max-w-md">
        <!-- Logo -->
        <div class="text-center mb-10">
            <a href="index.html" class="flex items-center gap-1 scale-90 md:scale-100 origin-left justify-center">
                <span class="text-xl md:text-2xl font-black tracking-tighter uppercase text-white">ANIME</span>
                <span class="text-xl md:text-2xl font-black tracking-tighter uppercase text-blue-500">HOUSE</span>
            </a>
            <p class="text-slate-500 text-sm font-medium">Junte-se à maior comunidade de animes.</p>
        </div>

        <!-- Register Card -->
        <div class="bg-slate-900/50 backdrop-blur-xl border border-white/5 p-8 rounded-3xl shadow-2xl">
            <h1 class="text-2xl font-black text-white mb-2 uppercase tracking-tighter">Criar Conta</h1>
            <p class="text-slate-400 text-sm mb-8">Rápido, fácil e gratuito.</p>

            <!-- Manual Form -->
            <form onsubmit="handleRegister(event)" class="space-y-5">
                <div>
                    <label class="block text-[11px] font-black text-slate-500 uppercase tracking-widest mb-2 ml-1">Nome de Usuário</label>
                    <input type="text" placeholder="Como quer ser chamado?" required
                        class="w-full h-12 bg-slate-800/50 border border-white/5 rounded-xl px-4 text-sm focus:outline-none focus:border-blue-500 transition-all placeholder:text-slate-600">
                </div>
                <div>
                    <label class="block text-[11px] font-black text-slate-500 uppercase tracking-widest mb-2 ml-1">E-mail</label>
                    <input type="email" placeholder="seu@email.com" required
                        class="w-full h-12 bg-slate-800/50 border border-white/5 rounded-xl px-4 text-sm focus:outline-none focus:border-blue-500 transition-all placeholder:text-slate-600">
                </div>
                <div>
                    <label class="block text-[11px] font-black text-slate-500 uppercase tracking-widest mb-2 ml-1">Senha</label>
                    <input type="password" placeholder="Crie uma senha forte" required
                        class="w-full h-12 bg-slate-800/50 border border-white/5 rounded-xl px-4 text-sm focus:outline-none focus:border-blue-500 transition-all placeholder:text-slate-600">
                </div>

                <div class="flex items-start gap-3 px-1 mt-6">
                    <input type="checkbox" required class="mt-1 w-4 h-4 rounded border-white/10 bg-slate-800 text-blue-500 focus:ring-blue-500">
                    <p class="text-[11px] text-slate-400 leading-tight">
                        Eu li e concordo com os <a href="termos.html" class="text-blue-500 hover:underline">Termos de Uso</a> e a <a href="#" class="text-blue-500 hover:underline">Política de Privacidade</a>.
                    </p>
                </div>

                <button type="submit" class="w-full h-12 bg-blue-600 hover:bg-blue-500 text-white rounded-xl font-black uppercase tracking-tighter transition-all mt-4 shadow-lg shadow-blue-500/30">
                    Cadastrar Agora
                </button>
            </form>

            <div class="flex items-center gap-4 my-8">
                <div class="flex-1 h-px bg-white/5"></div>
                <span class="text-[10px] font-black text-slate-600 uppercase tracking-widest">Ou</span>
                <div class="flex-1 h-px bg-white/5"></div>
            </div>

            <!-- Social Register -->
            <div class="grid grid-cols-2 gap-4">
                <button class="h-12 flex items-center justify-center gap-2 bg-[#02a9ff] hover:bg-[#0090da] text-white rounded-xl font-bold transition-all text-xs">
                    <i class="fa-solid fa-cloud"></i> AniList
                </button>
                <button class="h-12 flex items-center justify-center gap-2 bg-white hover:bg-slate-100 text-slate-900 rounded-xl font-bold transition-all text-xs">
                    <i class="fa-brands fa-google"></i> Google
                </button>
            </div>

            <p class="text-center mt-8 text-sm text-slate-500">
                Já tem uma conta? 
                <a href="login.html" class="text-white font-bold hover:text-blue-400 transition-colors">Faça login</a>
            </p>
        </div>
    </div>

    <script>
        function handleRegister(e) {
            e.preventDefault();
            // Simulação de cadastro
            const userData = {
                name: e.target[0].value,
                email: e.target[1].value,
                avatar: null,
                joinedAt: new Date().toISOString()
            };
            localStorage.setItem('ah_user_data', JSON.stringify(userData));
            alert('Conta criada com sucesso! Boas-vindas ao Better Anime.');
            window.location.href = 'index.html';
        }
    </script>
</body>

</html>
