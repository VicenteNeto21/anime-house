<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
    <title>Anime House - Detalhes do Anime</title>
    <link rel="icon" type="image/png" href="img/favicon.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            bg: '#0a0f1c',
                            card: '#161f2e',
                            blue: '#3b82f6'
                        }
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-brand-bg text-white min-h-screen">
    <!-- Navbar -->
    <nav class="fixed top-0 left-0 w-full z-50 nav-glass border-b border-white/5"></nav>

    <!-- Main Content -->
    <main id="details-app" class="pt-16">
        <!-- Hero/Banner Section -->
        <div id="anime-hero" class="relative h-[400px] md:h-[500px] w-full overflow-hidden">
            <div id="hero-banner" class="absolute inset-0 bg-cover bg-center transition-transform duration-700 scale-105"></div>
            <div class="absolute inset-0 bg-gradient-to-t from-brand-bg via-brand-bg/60 to-transparent"></div>
            
            <div class="container-max relative h-full flex flex-col justify-end pb-12">
                <div class="flex flex-col md:flex-row gap-8 items-end">
                    <!-- Poster -->
                    <div class="hidden md:block w-56 aspect-[2/3] rounded-2xl overflow-hidden shadow-2xl border border-white/10 -mb-20 z-20">
                        <img id="anime-poster" src="" class="w-full h-full object-cover" alt="">
                    </div>
                    
                    <!-- Basic Info -->
                    <div class="flex-grow">
                        <div id="anime-genres" class="flex flex-wrap gap-2 mb-6">
                            <!-- Gêneros aqui -->
                        </div>

                        <div class="flex flex-wrap items-center gap-4">
                            <button id="btn-watch" class="px-8 py-4 bg-blue-600 rounded-2xl font-black uppercase tracking-widest text-sm shadow-lg shadow-blue-600/30 flex items-center gap-3 hover:bg-blue-500 transition-all">
                                <i class="fa-solid fa-play"></i> Assistir Agora
                            </button>
                            
                            <button id="btn-favorite" class="w-14 h-14 bg-white/10 backdrop-blur-md rounded-2xl flex items-center justify-center text-xl border border-white/10 hover:bg-white/20 hover:text-red-500 transition-all group" title="Adicionar aos Favoritos">
                                <i class="fa-regular fa-heart group-active:scale-125 transition-transform"></i>
                            </button>

                            <button id="btn-trailer" class="hidden px-6 py-4 bg-white/5 backdrop-blur-md rounded-2xl font-bold uppercase tracking-widest text-[11px] border border-white/5 flex items-center gap-2 hover:bg-white/10 transition-all">
                                <i class="fa-brands fa-youtube text-red-500 text-lg"></i> Trailer
                            </button>
                        </div>
                        <h1 id="anime-title" class="text-3xl md:text-5xl font-black mb-4 tracking-tighter"></h1>
                        <div class="flex flex-wrap items-center gap-6 text-sm text-slate-300 font-medium">
                            <div class="flex items-center gap-2">
                                <i class="fa-solid fa-star text-yellow-500"></i>
                                <span id="anime-rating" class="font-bold text-white"></span>
                            </div>
                            <div id="anime-meta" class="flex items-center gap-4">
                                <!-- Year, Format, Status -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Content Grid -->
        <section class="container-max pt-24 pb-20">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-12">
                
                <!-- Sidebar Info (Mobile) -->
                <div class="lg:col-span-4 space-y-8">
                    <div class="bg-brand-card/30 p-6 rounded-2xl border border-white/5">
                        <h3 class="text-sm font-bold uppercase tracking-widest text-slate-500 mb-4">Sinopse</h3>
                        <p id="anime-description" class="text-slate-400 text-sm leading-relaxed"></p>
                    </div>

                    <div class="bg-brand-card/30 p-6 rounded-2xl border border-white/5">
                        <h3 class="text-sm font-bold uppercase tracking-widest text-slate-500 mb-4">Informações</h3>
                        <div id="sidebar-stats" class="space-y-4">
                            <!-- Detailed Stats -->
                        </div>
                    </div>

                    <!-- Tags -->
                    <div id="tags-container" class="bg-brand-card/30 p-6 rounded-2xl border border-white/5 hidden">
                        <h3 class="text-sm font-bold uppercase tracking-widest text-slate-500 mb-4">Tags</h3>
                        <div id="anime-tags" class="flex flex-wrap gap-2">
                            <!-- Tags aqui -->
                        </div>
                    </div>
                </div>

                <!-- Episodes List -->
                <div class="lg:col-span-8">
                    <div class="mb-10">
                        <h2 class="text-xl font-bold flex items-center gap-3 mb-6">
                            <i class="fa-solid fa-list-ul text-brand-blue"></i> Lista de Episódios
                        </h2>
                        
                        <!-- Paginação Estilo Carrossel com Máscara de Degradê -->
                        <div class="relative">
                            <div id="episodes-pagination" class="flex items-center gap-3 overflow-x-auto pb-4 no-scrollbar scroll-smooth">
                                <!-- Abas aqui -->
                            </div>
                            <!-- Máscaras laterais -->
                            <div class="absolute top-0 right-0 h-full w-20 bg-gradient-to-l from-[#0f172a] to-transparent pointer-events-none"></div>
                        </div>
                    </div>

                    <div id="episodes-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3">
                        <!-- Episodes here -->
                    </div>

                    <!-- Cronologia / Temporadas -->
                    <div id="relations-section" class="mt-16 hidden group/rel relative">
                        <h2 class="text-xl font-bold flex items-center gap-3 mb-8">
                            <i class="fa-solid fa-sitemap text-brand-blue"></i> Cronologia & Relacionados
                        </h2>
                        
                        <!-- Setas de Navegação -->
                        <button onclick="document.getElementById('relations-grid').scrollBy({left: -300, behavior: 'smooth'})" 
                                class="absolute left-0 top-1/2 -translate-y-1/2 z-10 w-10 h-10 bg-black/60 backdrop-blur-md rounded-full flex items-center justify-center border border-white/10 opacity-0 group-hover/rel:opacity-100 transition-opacity hover:bg-brand-blue">
                            <i class="fa-solid fa-chevron-left text-white"></i>
                        </button>
                        <button onclick="document.getElementById('relations-grid').scrollBy({left: 300, behavior: 'smooth'})" 
                                class="absolute right-0 top-1/2 -translate-y-1/2 z-10 w-10 h-10 bg-black/60 backdrop-blur-md rounded-full flex items-center justify-center border border-white/10 opacity-0 group-hover/rel:opacity-100 transition-opacity hover:bg-brand-blue">
                            <i class="fa-solid fa-chevron-right text-white"></i>
                        </button>

                        <div id="relations-grid" class="flex gap-4 overflow-x-auto pb-4 no-scrollbar scroll-smooth">
                            <!-- Relations aqui -->
                        </div>
                    </div>

                    <!-- Personagens -->
                    <div class="mt-16">
                        <h2 class="text-xl font-bold flex items-center gap-3 mb-8">
                            <i class="fa-solid fa-users text-brand-blue"></i> Personagens Principais
                        </h2>
                        <div id="characters-grid" class="grid grid-cols-3 sm:grid-cols-6 gap-4">
                            <!-- Characters here -->
                        </div>
                    </div>
                </div>

            </div>
        </section>

        <!-- Recomendações Section -->
        <section id="recommendations-section" class="container-max pb-24 hidden">
            <div class="border-t border-white/5 pt-16">
                <h2 class="text-xl font-bold flex items-center gap-3 mb-10">
                    <i class="fa-solid fa-wand-magic-sparkles text-brand-blue"></i> Porque você gostou deste
                </h2>
                <div id="recommendations-grid" class="grid grid-cols-2 md:grid-cols-5 gap-6">
                    <!-- Recommendations here -->
                </div>
            </div>
        </section>
    </main>

    <!-- Trailer Modal -->
    <div id="trailer-modal" class="fixed inset-0 z-[100] bg-black/95 flex items-center justify-center p-4 md:p-10 hidden">
        <div class="relative w-full max-w-5xl aspect-video bg-black rounded-3xl overflow-hidden border border-white/10 shadow-2xl">
            <button id="close-trailer" class="absolute top-4 right-4 z-50 w-10 h-10 bg-black/60 hover:bg-red-600 rounded-full flex items-center justify-center transition-colors">
                <i class="fa-solid fa-xmark text-white"></i>
            </button>
            <div id="trailer-container" class="w-full h-full"></div>
        </div>
    </div>

    <footer class="bg-brand-bg border-t border-slate-800 py-16 mt-20"></footer>



    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/details.js"></script>
</body>
</html>
