<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gêneros - Anime House</title>
    <link rel="icon" type="image/png" href="img/favicon.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            bg: '#0a0f1c',
                            card: '#161f2e',
                            blue: '#3b82f6'
                        }
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-brand-bg text-white min-h-screen">
    <!-- Navbar -->
    <nav class="fixed top-0 left-0 w-full z-50 nav-glass border-b border-white/5"></nav>

    <!-- Content -->
    <main class="pt-32 pb-20 container-max">
        <div class="flex items-center gap-4 mb-10">
            <div class="w-12 h-12 bg-blue-600/20 border border-blue-500/30 rounded-2xl flex items-center justify-center text-brand-blue">
                <i class="fa-solid fa-tags text-xl"></i>
            </div>
            <div>
                <h1 class="text-4xl font-black tracking-tighter uppercase">Gêneros</h1>
                <p class="text-slate-400 text-sm">Encontre seu próximo anime favorito por categoria.</p>
            </div>
        </div>

        <!-- Genres Grid -->
        <div id="genres-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
            <!-- Loading Skeletons -->
            <div class="h-32 bg-brand-card/50 rounded-3xl skeleton"></div>
            <div class="h-32 bg-brand-card/50 rounded-3xl skeleton"></div>
            <div class="h-32 bg-brand-card/50 rounded-3xl skeleton"></div>
            <div class="h-32 bg-brand-card/50 rounded-3xl skeleton"></div>
            <div class="h-32 bg-brand-card/50 rounded-3xl skeleton"></div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-brand-bg border-t border-slate-800 py-16 mt-20"></footer>



    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script>
        const GenreApp = {
            genreIcons: {
                'Action': 'fa-fire-flame-curved',
                'Adventure': 'fa-compass',
                'Comedy': 'fa-face-laugh-squint',
                'Drama': 'fa-masks-theater',
                'Fantasy': 'fa-wand-magic-sparkles',
                'Horror': 'fa-ghost',
                'Mahou Shoujo': 'fa-wand-sparkles',
                'Mecha': 'fa-robot',
                'Music': 'fa-music',
                'Mystery': 'fa-magnifying-glass',
                'Psychological': 'fa-brain',
                'Romance': 'fa-heart',
                'Sci-Fi': 'fa-shuttle-space',
                'Slice of Life': 'fa-mug-hot',
                'Sports': 'fa-volleyball',
                'Supernatural': 'fa-bolt',
                'Thriller': 'fa-skull'
            },

            genreTranslations: {
                'Action': 'Ação', 'Adventure': 'Aventura', 'Comedy': 'Comédia', 'Drama': 'Drama',
                'Fantasy': 'Fantasia', 'Horror': 'Terror', 'Mahou Shoujo': 'Garotas Mágicas',
                'Mecha': 'Mecha', 'Music': 'Música', 'Mystery': 'Mistério', 'Psychological': 'Psicológico',
                'Romance': 'Romance', 'Sci-Fi': 'Ficção Científica', 'Slice of Life': 'Cotidiano',
                'Sports': 'Esportes', 'Supernatural': 'Sobrenatural', 'Thriller': 'Suspense'
            },

            gradients: [
                'from-blue-600 to-indigo-600',
                'from-purple-600 to-pink-600',
                'from-orange-600 to-red-600',
                'from-emerald-600 to-teal-600',
                'from-pink-600 to-rose-600',
                'from-cyan-600 to-blue-600'
            ],

            async init() {
                await this.loadGenres();
            },

            async loadGenres() {
                const grid = document.getElementById('genres-grid');
                try {
                    const genres = await AniListAPI.getGenres();
                    grid.innerHTML = genres.map((genre, index) => {
                        const translation = this.genreTranslations[genre] || genre;
                        const icon = this.genreIcons[genre] || 'fa-tag';
                        const gradient = this.gradients[index % this.gradients.length];

                        return `
                            <a href="lista.html?genre=${genre}" class="group relative overflow-hidden h-32 rounded-3xl bg-brand-card border border-white/5 hover:border-blue-500/50 transition-all duration-500 hover:-translate-y-1">
                                <div class="absolute inset-0 bg-gradient-to-br ${gradient} opacity-20 group-hover:opacity-40 transition-opacity"></div>
                                <div class="absolute inset-0 flex flex-col items-center justify-center gap-3">
                                    <i class="fa-solid ${icon} text-2xl text-white/40 group-hover:text-white transition-all group-hover:scale-110"></i>
                                    <span class="text-sm font-black tracking-tighter uppercase text-white/80 group-hover:text-white">${translation}</span>
                                </div>
                            </a>
                        `;
                    }).join('');
                } catch (error) {
                    grid.innerHTML = '<p class="text-red-500">Erro ao carregar gêneros.</p>';
                }
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            GenreApp.init();
        });
        window.App = GenreApp;
    </script>
</body>

</html>
