<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime House - O seu portal premium de animes</title>
    <link rel="icon" type="image/png" href="img/favicon.png">

    <!-- Scripts: Tailwind CDN, Lucide Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            bg: '#0a0f1c',
                            card: '#161f2e',
                            blue: '#3b82f6'
                        }
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-brand-bg text-white min-h-screen">
    <!-- Navbar -->
    <nav class="fixed top-0 left-0 w-full z-50 nav-glass border-b border-white/5"></nav>

    <main id="app" class="pt-16">
        <!-- Highlights Carousel/Grid -->
        <section id="hero" class="relative bg-slate-950 py-3 overflow-hidden border-b border-white/5">
            <div class="container-max relative z-20">
                <div id="highlights-grid" class="grid grid-cols-3 md:grid-cols-6 gap-2">
                    <!-- Dinamicamente preenchido com UI.renderHighlight -->
                </div>
            </div>
        </section>

        <!-- Calendar Bar Container -->
        <div class="container-max mt-6 mb-2">
            <div id="calendar-bar"
                class="bg-blue-600 hover:bg-blue-500 py-2.5 px-4 rounded-lg cursor-pointer transition-all border border-blue-400/20">
                <div class="flex items-center justify-between text-[11px] font-black uppercase tracking-wider">
                    <div class="flex items-center gap-3">
                        <i class="fa-solid fa-calendar-day fa-lg text-white"></i>
                        <span class="text-white mr-4">Calendário</span>
                        
                        <div id="calendar-days" class="hidden md:flex items-center gap-1 bg-black/20 p-1 rounded-lg">
                            <!-- JS vai preencher os dias aqui -->
                        </div>
                    </div>
                    <i id="calendar-icon"
                        class="fa-solid fa-chevron-down text-white/70 transition-transform duration-300"></i>
                </div>
            </div>

            <!-- Calendar Content -->
            <div id="calendar-content"
                class="bg-slate-900/40 hidden rounded-b-lg border-x border-b border-white/5 overflow-hidden relative group/cal">
                <!-- Navigation Arrows -->
                <button onclick="document.getElementById('airing-grid').scrollBy({left: -400, behavior: 'smooth'})"
                    class="absolute left-2 top-1/2 -translate-y-1/2 z-30 w-10 h-10 bg-black/60 backdrop-blur-md rounded-full flex items-center justify-center border border-white/10 opacity-0 group-hover/cal:opacity-100 transition-opacity hover:bg-blue-600">
                    <i class="fa-solid fa-chevron-left text-white"></i>
                </button>
                <button onclick="document.getElementById('airing-grid').scrollBy({left: 400, behavior: 'smooth'})"
                    class="absolute right-2 top-1/2 -translate-y-1/2 z-30 w-10 h-10 bg-black/60 backdrop-blur-md rounded-full flex items-center justify-center border border-white/10 opacity-0 group-hover/cal:opacity-100 transition-opacity hover:bg-blue-600">
                    <i class="fa-solid fa-chevron-right text-white"></i>
                </button>

                <div class="py-6 px-4">
                    <div id="airing-grid" class="flex gap-4 overflow-x-auto pb-2 no-scrollbar scroll-smooth">
                        <!-- Preenchido pelo AniListAPI -->
                        <div class="text-slate-500 text-xs animate-pulse italic">Sincronizando com AniList...</div>
                    </div>
                </div>
            </div>
        </div>

        <section class="pt-8 pb-12 container-max">
            <div class="flex items-center justify-between mb-8">
                <h2 class="text-lg font-bold flex items-center gap-2">
                    <i class="fa-solid fa-play-circle text-brand-blue w-5 h-5"></i> Últimos Lançamentos
                </h2>
                <button
                    class="bg-blue-600 hover:bg-blue-500 px-5 py-2 rounded-full text-[11px] font-black uppercase tracking-wider flex items-center gap-2 transition-all">
                    <i class="fa-solid fa-plus fa-sm"></i> Ver mais
                </button>
            </div>

            <div id="anime-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
                <!-- Anime cards -->
            </div>

            <div id="pagination-container">
                <!-- Paginação renderizada aqui -->
            </div>
        </section>

        <!-- Ranking Section -->
        <section class="py-12 bg-slate-950/50">
            <div class="container-max">
                <div class="flex items-center gap-2 mb-8">
                    <i class="fa-solid fa-trophy text-yellow-500 w-6 h-6"></i>
                    <h2 class="text-xl font-bold">Ranking Global</h2>
                    <span
                        class="text-[10px] bg-slate-800 px-2 py-0.5 rounded-full text-slate-400 uppercase font-bold tracking-widest ml-2">AniList
                        Score</span>
                </div>

                <div id="ranking-grid" class="grid grid-cols-1 lg:grid-cols-2 gap-4">
                    <!-- Preenchido dinamicamente -->
                    <div class="col-span-full py-20 text-center text-slate-500">
                        <i class="fa-solid fa-circle-notch fa-spin text-2xl mb-4"></i>
                        <p class="text-sm italic">Calculando métricas globais...</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="bg-brand-bg border-t border-slate-800 py-16 mt-20"></footer>



    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
