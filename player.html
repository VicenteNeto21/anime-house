<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistindo - Anime House</title>
    <link rel="icon" type="image/png" href="img/favicon.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            bg: '#0a0f1c',
                            card: '#161f2e',
                            blue: '#3b82f6'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .player-container {
            box-shadow: 0 0 50px -12px rgba(59, 130, 246, 0.25);
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(59, 130, 246, 0.3); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(59, 130, 246, 0.6); }
    </style>
</head>
<body class="bg-brand-bg text-white min-h-screen">
    <!-- Navbar -->
    <nav class="fixed top-0 left-0 w-full z-50 nav-glass border-b border-white/5"></nav>

    <main class="pt-20 md:pt-24 pb-20">
        <div class="container-max">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                
                <!-- Player Column -->
                <div class="lg:col-span-8 xl:col-span-9">
                    <!-- Video Area -->
                    <div class="player-container relative w-full aspect-video bg-black rounded-2xl md:rounded-3xl overflow-hidden border border-white/5 shadow-2xl group">
                        <div id="video-placeholder" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-950/50 backdrop-blur-sm">
                            <i class="fa-solid fa-circle-notch fa-spin text-4xl text-blue-500 mb-4"></i>
                            <p class="text-slate-400 font-bold uppercase tracking-widest text-[10px]">Carregando Episódio...</p>
                        </div>
                        <div id="player-frame" class="w-full h-full"></div>
                        
                        <!-- Overlay Controls (Visual Only for UI) -->
                        <div class="absolute bottom-0 left-0 w-full p-6 bg-gradient-to-t from-black/80 to-transparent opacity-0 group-hover:opacity-100 transition-opacity">
                            <div class="flex items-center justify-between">
                                <div class="flex items-center gap-6">
                                    <button class="text-white hover:text-blue-400 transition-colors"><i class="fa-solid fa-backward-step"></i></button>
                                    <button class="text-white hover:text-blue-400 transition-colors text-2xl"><i class="fa-solid fa-play"></i></button>
                                    <button class="text-white hover:text-blue-400 transition-colors"><i class="fa-solid fa-forward-step"></i></button>
                                </div>
                                <div class="flex items-center gap-6">
                                    <button class="text-white hover:text-blue-400 transition-colors"><i class="fa-solid fa-expand"></i></button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Player Info & Actions -->
                    <div class="mt-8">
                        <div class="flex flex-col md:flex-row md:items-center justify-between gap-6">
                            <div>
                                <h1 id="player-title" class="text-2xl md:text-3xl font-black tracking-tighter mb-2">Título do Episódio</h1>
                                <p id="player-anime-name" class="text-blue-500 font-bold uppercase tracking-widest text-xs"></p>
                            </div>
                            
                            <div class="flex flex-wrap items-center gap-3">
                                <button id="btn-prev" class="h-11 px-5 bg-white/5 border border-white/10 rounded-xl flex items-center gap-2 hover:bg-white/10 transition-all text-xs font-bold uppercase tracking-widest">
                                    <i class="fa-solid fa-arrow-left"></i> Anterior
                                </button>
                                <button id="btn-next" class="h-11 px-5 bg-blue-600 rounded-xl flex items-center gap-2 hover:bg-blue-500 transition-all text-xs font-bold uppercase tracking-widest shadow-lg shadow-blue-600/20">
                                    Próximo <i class="fa-solid fa-arrow-right"></i>
                                </button>
                                <button id="btn-lights" class="h-11 w-11 bg-white/5 border border-white/10 rounded-xl flex items-center justify-center hover:bg-white/10 transition-all" title="Apagar Luzes">
                                    <i class="fa-solid fa-lightbulb"></i>
                                </button>
                            </div>
                        </div>

                        <!-- Secondary Actions -->
                        <div class="flex items-center gap-4 mt-8 py-6 border-y border-white/5">
                            <button class="flex items-center gap-2 text-xs font-bold text-slate-400 hover:text-white transition-colors">
                                <i class="fa-solid fa-download"></i> Baixar
                            </button>
                            <button id="btn-nyaa" class="flex items-center gap-2 text-xs font-bold text-blue-400 hover:text-blue-300 transition-colors">
                                <i class="fa-solid fa-magnet"></i> Buscar no Nyaa (Experimental)
                            </button>
                            <button class="flex items-center gap-2 text-xs font-bold text-slate-400 hover:text-white transition-colors">
                                <i class="fa-solid fa-share-nodes"></i> Compartilhar
                            </button>
                        </div>

                        <!-- Nyaa Results Area (Hidden by default) -->
                        <div id="nyaa-section" class="mt-6 bg-slate-900/50 rounded-2xl border border-blue-500/10 p-6 hidden">
                            <h3 class="text-xs font-black uppercase text-blue-400 mb-4 tracking-widest">Torrents Disponíveis (WebTorrent)</h3>
                            <div id="nyaa-results" class="grid grid-cols-1 gap-3">
                                <!-- Resultados aqui -->
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Sidebar (Episode List) -->
                <div class="lg:col-span-4 xl:col-span-3">
                    <div class="bg-brand-card/40 border border-white/5 rounded-3xl overflow-hidden flex flex-col h-[600px] lg:h-[700px] sticky top-24">
                        <div class="p-6 border-b border-white/5 bg-white/5">
                            <h2 class="text-sm font-black uppercase tracking-widest flex items-center gap-3">
                                <i class="fa-solid fa-list text-blue-500"></i> Episódios
                            </h2>
                        </div>
                        
                        <div id="episodes-list" class="flex-grow overflow-y-auto p-4 space-y-2 custom-scrollbar">
                            <!-- Episódios aqui -->
                        </div>
                        
                        <div class="p-4 border-t border-white/5 bg-black/20">
                            <p class="text-[10px] text-slate-500 font-bold uppercase text-center">Você está assistindo agora</p>
                        </div>
                    </div>
                </div>

            </div>

            <!-- Recomendações -->
            <section class="mt-20">
                <h2 class="text-xl font-bold flex items-center gap-3 mb-10">
                    <i class="fa-solid fa-fire text-orange-500"></i> Continue Assistindo
                </h2>
                <div id="recommendations-grid" class="grid grid-cols-2 md:grid-cols-5 gap-6">
                    <!-- Recomendações dinâmicas -->
                </div>
            </section>
        </div>
    </main>

    <footer class="bg-brand-bg border-t border-slate-800 py-16 mt-20"></footer>

    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/nyaa.js"></script>
    <script src="js/player.js"></script>
</body>
</html>
