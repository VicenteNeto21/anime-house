<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar - Anime House</title>
    <link rel="icon" type="image/png" href="img/favicon.png">

    <!-- Scripts: Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            bg: '#0a0f1c',
                            card: '#161f2e',
                            blue: '#3b82f6'
                        }
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-brand-bg text-slate-200 font-sans min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
    <!-- Animated Background Elements -->
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden -z-10">
        <div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] bg-blue-600/20 rounded-full blur-[120px] animate-pulse"></div>
        <div class="absolute -bottom-[10%] -right-[10%] w-[40%] h-[40%] bg-indigo-600/20 rounded-full blur-[120px] animate-pulse" style="animation-delay: 2s;"></div>
    </div>

    <div class="w-full max-w-md">
        <!-- Logo -->
        <div class="text-center mb-10">
            <a href="index.html" class="flex items-center gap-1 scale-90 md:scale-100 origin-left justify-center">
                <span class="text-xl md:text-2xl font-black tracking-tighter uppercase text-white">ANIME</span>
                <span class="text-xl md:text-2xl font-black tracking-tighter uppercase text-blue-500">HOUSE</span>
            </a>
            <p class="text-slate-500 text-sm font-medium">Sua casa de animes favorita está de volta.</p>
        </div>

        <!-- Login Card -->
        <div class="bg-slate-900/50 backdrop-blur-xl border border-white/5 p-8 rounded-3xl shadow-2xl">
            <h1 class="text-2xl font-black text-white mb-2 uppercase tracking-tighter">Boas-vindas!</h1>
            <p class="text-slate-400 text-sm mb-8">Escolha como deseja entrar na plataforma.</p>

            <!-- Social Login -->
            <div class="space-y-4 mb-8">
                <button onclick="handleAniListLogin()" class="w-full h-12 flex items-center justify-center gap-3 bg-[#02a9ff] hover:bg-[#0090da] text-white rounded-xl font-bold transition-all shadow-lg shadow-blue-500/20 group">
                    <i class="fa-solid fa-cloud text-lg group-hover:scale-110 transition-transform"></i>
                    Conectar com AniList
                </button>
                <button class="w-full h-12 flex items-center justify-center gap-3 bg-white hover:bg-slate-100 text-slate-900 rounded-xl font-bold transition-all shadow-lg group">
                    <i class="fa-brands fa-google text-lg group-hover:scale-110 transition-transform"></i>
                    Entrar com Google
                </button>
            </div>

            <div class="flex items-center gap-4 mb-8">
                <div class="flex-1 h-px bg-white/5"></div>
                <span class="text-[10px] font-black text-slate-600 uppercase tracking-widest">Ou use seu e-mail</span>
                <div class="flex-1 h-px bg-white/5"></div>
            </div>

            <!-- Manual Form -->
            <form onsubmit="handleManualLogin(event)" class="space-y-5">
                <div>
                    <label class="block text-[11px] font-black text-slate-500 uppercase tracking-widest mb-2 ml-1">E-mail</label>
                    <input type="email" placeholder="seu@email.com" required
                        class="w-full h-12 bg-slate-800/50 border border-white/5 rounded-xl px-4 text-sm focus:outline-none focus:border-blue-500 transition-all placeholder:text-slate-600">
                </div>
                <div>
                    <div class="flex justify-between items-center mb-2 px-1">
                        <label class="text-[11px] font-black text-slate-500 uppercase tracking-widest">Senha</label>
                        <a href="#" class="text-[11px] font-black text-blue-500 uppercase tracking-widest hover:text-blue-400">Esqueceu?</a>
                    </div>
                    <input type="password" placeholder="••••••••" required
                        class="w-full h-12 bg-slate-800/50 border border-white/5 rounded-xl px-4 text-sm focus:outline-none focus:border-blue-500 transition-all placeholder:text-slate-600">
                </div>

                <button type="submit" class="w-full h-12 bg-slate-100 hover:bg-white text-slate-950 rounded-xl font-black uppercase tracking-tighter transition-all mt-4">
                    Entrar
                </button>
            </form>

            <p class="text-center mt-8 text-sm text-slate-500">
                Ainda não tem conta? 
                <a href="cadastro.html" class="text-white font-bold hover:text-blue-400 transition-colors">Crie uma agora</a>
            </p>
        </div>

        <!-- Footer Links -->
        <div class="mt-8 flex justify-center gap-6 text-[11px] font-black text-slate-600 uppercase tracking-widest">
            <a href="dmca.html" class="hover:text-slate-400 transition-colors">DMCA</a>
            <a href="#" class="hover:text-slate-400 transition-colors">Privacidade</a>
            <a href="#" class="hover:text-slate-400 transition-colors">Suporte</a>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        function handleManualLogin(e) {
            e.preventDefault();
            // Simulação de login
            const userData = {
                name: 'Otaku Master',
                email: 'user@example.com',
                avatar: null,
                joinedAt: new Date().toISOString()
            };
            localStorage.setItem('ah_user_data', JSON.stringify(userData));
            window.location.href = 'index.html';
        }

        function handleAniListLogin() {
            const clientID = '10978'; 
            const redirectUri = window.location.origin; // O usuário configurou como http://localhost:5500
            const authUrl = `https://anilist.co/api/v2/oauth/authorize?client_id=${clientID}&response_type=token`;
            
            window.location.href = authUrl;
        }
    </script>
</body>

</html>
