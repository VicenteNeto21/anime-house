<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Animes - Anime House</title>
    <link rel="icon" type="image/png" href="img/favicon.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            bg: '#0a0f1c',
                            card: '#161f2e',
                            blue: '#3b82f6'
                        }
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-brand-bg text-white min-h-screen">
    <!-- Navbar -->
    <nav class="fixed top-0 left-0 w-full z-50 nav-glass border-b border-white/5"></nav>

    <!-- Content -->
    <main class="pt-28 pb-20 container-max">
        <!-- Header & Filters -->
        <div class="mb-10">
            <div class="flex flex-col md:flex-row md:items-end justify-between gap-6">
                <div>
                    <h1 class="text-3xl font-black tracking-tighter uppercase mb-2">Lista de Animes</h1>
                    <p class="text-slate-400 text-sm">Explore nosso catálogo completo com mais de 10.000 títulos.</p>
                </div>

                <div class="flex flex-wrap items-center gap-3">
                    <!-- Sort -->
                    <select id="filter-sort" class="bg-brand-card border border-white/10 text-[12px] font-bold py-2 px-4 rounded-xl focus:outline-none focus:border-blue-500 transition-colors cursor-pointer">
                        <option value="TRENDING_DESC">Tendência</option>
                        <option value="POPULARITY_DESC">Mais Populares</option>
                        <option value="SCORE_DESC">Melhor Avaliados</option>
                        <option value="UPDATED_AT_DESC">Lançamentos</option>
                    </select>

                    <!-- Genre -->
                    <select id="filter-genre" class="bg-brand-card border border-white/10 text-[12px] font-bold py-2 px-4 rounded-xl focus:outline-none focus:border-blue-500 transition-colors cursor-pointer">
                        <option value="">Gêneros (Todos)</option>
                        <option value="Action">Ação</option>
                        <option value="Adventure">Aventura</option>
                        <option value="Comedy">Comédia</option>
                        <option value="Drama">Drama</option>
                        <option value="Fantasy">Fantasia</option>
                        <option value="Horror">Terror</option>
                        <option value="Mystery">Mistério</option>
                        <option value="Psychological">Psicológico</option>
                        <option value="Romance">Romance</option>
                        <option value="Sci-Fi">Ficção Científica</option>
                        <option value="Slice of Life">Cotidiano</option>
                        <option value="Sports">Esportes</option>
                        <option value="Supernatural">Sobrenatural</option>
                    </select>

                    <!-- Year -->
                    <select id="filter-year" class="bg-brand-card border border-white/10 text-[12px] font-bold py-2 px-4 rounded-xl focus:outline-none focus:border-blue-500 transition-colors cursor-pointer">
                        <option value="">Anos (Todos)</option>
                        <option value="2026">2026</option>
                        <option value="2025">2025</option>
                        <option value="2024">2024</option>
                        <option value="2023">2023</option>
                        <option value="2022">2022</option>
                        <option value="2021">2021</option>
                        <option value="2020">2020</option>
                        <option value="2019">2019</option>
                        <option value="2018">2018</option>
                        <option value="2017">2017</option>
                        <option value="2016">2016</option>
                        <option value="2015">2015</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Grid -->
        <div id="list-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6">
            <!-- Skeletons loader -->
            <div class="skeleton aspect-[2/3] rounded-2xl"></div>
            <div class="skeleton aspect-[2/3] rounded-2xl"></div>
            <div class="skeleton aspect-[2/3] rounded-2xl"></div>
            <div class="skeleton aspect-[2/3] rounded-2xl"></div>
            <div class="skeleton aspect-[2/3] rounded-2xl"></div>
            <div class="skeleton aspect-[2/3] rounded-2xl"></div>
        </div>

        <!-- Pagination -->
        <div id="pagination-container"></div>
    </main>



    <!-- Footer -->
    <footer class="bg-brand-bg border-t border-slate-800 py-16 mt-20"></footer>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/list.js"></script>
</body>

</html>
